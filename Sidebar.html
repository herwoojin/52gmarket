<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  *{box-sizing:border-box}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;margin:0;padding:14px;
    background:#0e1813;color:#e9f2e8;font-size:13px}
  h3{margin:0 0 12px;font-size:15px;color:#73d98a}
  label{display:block;font-weight:700;margin:10px 0 4px;font-size:12px;color:#8ba596}
  input,select,textarea{
    width:100%;background:#14241b;border:1px solid #22382b;
    border-radius:9px;padding:9px 10px;color:#e9f2e8;font-size:13px;font-family:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:#52c06e}
  textarea{resize:vertical;min-height:54px}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:8px;border:1px solid #22382b;background:#14241b;color:#8ba596;
    border-radius:9px;font-weight:700;cursor:pointer;font-size:12px;transition:.15s}
  .seg button.on{background:#52c06e;color:#06120a;border-color:#52c06e}
  .row2{display:flex;gap:8px}
  .row2>div{flex:1}
  .photo-box{margin-top:4px;border:1.5px dashed #22382b;border-radius:10px;padding:12px;
    text-align:center;cursor:pointer;background:#14241b;transition:.15s}
  .photo-box:hover{border-color:#52c06e}
  .photo-box img{max-width:100%;border-radius:8px;margin-top:8px;max-height:110px;object-fit:contain}
  .btn{width:100%;padding:11px;border:none;border-radius:11px;background:#52c06e;color:#06120a;
    font-weight:800;font-size:14px;cursor:pointer;margin-top:12px;transition:.15s}
  .btn:active{opacity:.8}
  .btn.ghost{background:#14241b;color:#e9f2e8;border:1px solid #22382b;margin-top:0}
  .btn.danger{background:#7a1f1f;color:#f8d0d0;border:none}
  .hint{color:#8ba596;font-size:11px}
  .msg{margin-top:10px;padding:9px 11px;border-radius:9px;font-size:12px;display:none;line-height:1.5}
  .msg.ok{background:rgba(82,192,110,.13);border:1px solid #52c06e;display:block}
  .msg.err{background:rgba(226,75,74,.13);border:1px solid #e24b4a;display:block}
  #priceWrap{display:none}
  .spin{opacity:.45;pointer-events:none}
  .divider{border:none;border-top:1px solid #1e3224;margin:14px 0}
  .status-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .status-판매중{background:#1a3a2a;color:#52c06e}
  .status-거래완료{background:#1a2a3a;color:#52a0c0}
  .status-삭제{background:#2a1a1a;color:#888}
  select option{background:#14241b}
  #productSelect{border-color:#52c06e;font-weight:700}
  .upload-status{font-size:11px;color:#8ba596;margin-top:5px;min-height:16px}
</style>
</head>
<body>
  <h3>🥒 매물 등록 · 편집</h3>

  <!-- 매물 선택 드롭다운 -->
  <label>매물 선택 (편집 시)</label>
  <select id="productSelect" onchange="onProductSelect(this.value)">
    <option value="">➕ 새 매물 등록</option>
  </select>
  <button class="btn ghost" style="margin-top:6px" onclick="refreshList()">🔄 목록 새로고침</button>

  <hr class="divider">

  <!-- 폼 -->
  <input type="hidden" id="fId">
  <input type="hidden" id="fPhotoURL">

  <label>제목 *</label>
  <input id="fTitle" placeholder="예) HP 26A 토너 미개봉">

  <div class="row2">
    <div>
      <label>카테고리</label>
      <select id="fCategory">
        <option>전산소모품</option>
        <option>사무용품</option>
        <option>가구·비품</option>
        <option>기타</option>
      </select>
    </div>
    <div>
      <label>거래 방식</label>
      <div class="seg">
        <button type="button" id="dealShare" class="on" onclick="setDeal('나눔')">나눔</button>
        <button type="button" id="dealSale" onclick="setDeal('판매')">판매</button>
      </div>
    </div>
  </div>

  <div id="priceWrap">
    <label>단가 (원)</label>
    <input id="fPrice" type="number" placeholder="5000">
  </div>

  <div class="row2">
    <div>
      <label>픽업 위치</label>
      <input id="fLoc" placeholder="예) 본사 3층">
    </div>
    <div>
      <label>닉네임</label>
      <input id="fNick" placeholder="예) 오이박사">
    </div>
  </div>

  <label>설명</label>
  <textarea id="fDesc" rows="3" placeholder="상태·수량·픽업 시간 등"></textarea>

  <label>사진 <span class="hint">(Google Drive 자동 업로드)</span></label>
  <div class="photo-box" onclick="document.getElementById('fFile').click()">
    <span id="photoLabel">📷 사진 선택 (클릭)</span>
    <input id="fFile" type="file" accept="image/*" style="display:none" onchange="convertAndUpload(this)">
    <img id="fPreview" style="display:none" alt="미리보기">
  </div>
  <div class="upload-status" id="uploadStatus"></div>

  <button class="btn" id="saveBtn" onclick="save()">💾 시트에 저장</button>
  <div id="msg" class="msg"></div>

<script>
  let deal = '나눔';
  let allProducts = [];

  /* ── 초기화: 페이지 로드 시 목록 불러오기 ── */
  window.onload = function() { refreshList(); };

  function refreshList() {
    document.getElementById('productSelect').innerHTML = '<option value="">⏳ 불러오는 중...</option>';
    google.script.run
      .withSuccessHandler(products => {
        allProducts = products || [];
        const sel = document.getElementById('productSelect');
        sel.innerHTML = '<option value="">➕ 새 매물 등록</option>';
        products.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          const statusIcon = p.status === '판매중' ? '🟢' : p.status === '거래완료' ? '🔵' : '🔴';
          opt.textContent = statusIcon + ' ' + (p.title || '(제목 없음)') + ' — ' + (p.loc || '');
          sel.appendChild(opt);
        });
        flash('목록 로드 완료 (' + products.length + '개)', 'ok');
      })
      .withFailureHandler(e => {
        document.getElementById('productSelect').innerHTML = '<option value="">⚠️ 불러오기 실패</option>';
        flash('목록 불러오기 실패: ' + e.message, 'err');
      })
      .getAllProductsForSidebar();
  }

  function onProductSelect(id) {
    if (!id) { resetForm(); return; }
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    fillForm(p);
  }

  function fillForm(p) {
    document.getElementById('fId').value = p.id || '';
    document.getElementById('fTitle').value = p.title || '';
    document.getElementById('fCategory').value = p.category || '기타';
    setDeal(p.deal || '나눔');
    document.getElementById('fPrice').value = p.price || '';
    document.getElementById('fLoc').value = p.loc || '';
    document.getElementById('fNick').value = p.nick || '';
    document.getElementById('fDesc').value = p.desc || '';
    document.getElementById('fPhotoURL').value = p.photoURL || '';

    const preview = document.getElementById('fPreview');
    if (p.photoURL && p.photoURL.startsWith('http')) {
      preview.src = p.photoURL;
      preview.style.display = 'block';
      document.getElementById('photoLabel').textContent = '✅ 사진 있음 (클릭하여 교체)';
    } else {
      preview.style.display = 'none';
      document.getElementById('photoLabel').textContent = '📷 사진 선택 (클릭)';
    }
    flash('불러왔어요. 수정 후 저장하세요.', 'ok');
  }

  function resetForm() {
    document.getElementById('fId').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fCategory').value = '전산소모품';
    setDeal('나눔');
    document.getElementById('fPrice').value = '';
    document.getElementById('fLoc').value = '';
    document.getElementById('fNick').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fPhotoURL').value = '';
    document.getElementById('fPreview').style.display = 'none';
    document.getElementById('photoLabel').textContent = '📷 사진 선택 (클릭)';
    document.getElementById('uploadStatus').textContent = '';
    document.getElementById('msg').className = 'msg';
  }

  function setDeal(d) {
    deal = d;
    document.getElementById('dealShare').classList.toggle('on', d === '나눔');
    document.getElementById('dealSale').classList.toggle('on', d === '판매');
    document.getElementById('priceWrap').style.display = d === '판매' ? 'block' : 'none';
  }

  function convertAndUpload(input) {
    const f = input.files[0];
    if (!f) return;

    const statusEl = document.getElementById('uploadStatus');
    statusEl.textContent = '⏳ 이미지 변환 중...';
    document.getElementById('photoLabel').textContent = '변환 중...';

    const img = new Image();
    const url = URL.createObjectURL(f);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const max = 1280;
      let { width: w, height: h } = img;
      if (w > max || h > max) {
        const r = Math.min(max / w, max / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);

      cv.toBlob(blob => {
        const objUrl = URL.createObjectURL(blob);
        document.getElementById('fPreview').src = objUrl;
        document.getElementById('fPreview').style.display = 'block';

        statusEl.textContent = '☁️ Google Drive 업로드 중...';
        const fr = new FileReader();
        fr.onload = () => {
          const b64 = fr.result.split(',')[1];
          google.script.run
            .withSuccessHandler(res => {
              document.getElementById('fPhotoURL').value = res.url;
              document.getElementById('photoLabel').textContent = '✅ 업로드 완료 (클릭하여 교체)';
              statusEl.textContent = '✅ Drive 업로드 완료';
            })
            .withFailureHandler(e => {
              document.getElementById('photoLabel').textContent = '📷 사진 선택 (클릭)';
              statusEl.textContent = '❌ 업로드 실패: ' + e.message;
            })
            .uploadPhotoFromSidebar(b64, f.name.replace(/\.\w+$/, '.webp'), 'image/webp');
        };
        fr.readAsDataURL(blob);
      }, 'image/webp', 0.8);
    };
    img.onerror = () => { statusEl.textContent = '❌ 이미지 읽기 실패'; };
    img.src = url;
  }

  function save() {
    if (!document.getElementById('fTitle').value.trim()) {
      flash('제목을 입력하세요', 'err'); return;
    }
    const btn = document.getElementById('saveBtn');
    btn.classList.add('spin'); btn.textContent = '저장 중...';

    const item = {
      id: document.getElementById('fId').value || undefined,
      title: document.getElementById('fTitle').value.trim(),
      category: document.getElementById('fCategory').value,
      deal: deal,
      price: deal === '판매' ? (Number(document.getElementById('fPrice').value) || 0) : 0,
      loc: document.getElementById('fLoc').value.trim(),
      nick: document.getElementById('fNick').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      photoURL: document.getElementById('fPhotoURL').value,
      status: '판매중'
    };

    google.script.run
      .withSuccessHandler(r => {
        btn.classList.remove('spin'); btn.textContent = '💾 시트에 저장';
        flash(r.mode + ' 완료! (id: ' + r.id + ')', 'ok');
        refreshList();
        if (r.mode === '등록') { resetForm(); }
      })
      .withFailureHandler(e => {
        btn.classList.remove('spin'); btn.textContent = '💾 시트에 저장';
        flash('저장 실패: ' + e.message, 'err');
      })
      .saveFromSidebar(item);
  }

  function flash(t, type) {
    const m = document.getElementById('msg');
    m.textContent = t; m.className = 'msg ' + type;
    if (type === 'ok') setTimeout(() => { m.className = 'msg'; }, 4000);
  }
</script>
</body>
</html>
