<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;margin:0;padding:14px;
    background:#0e1813;color:#e9f2e8;font-size:13px}
  h3{margin:0 0 12px;font-size:15px;color:#73d98a}
  label{display:block;font-weight:700;margin:12px 0 5px;font-size:12px}
  input,select,textarea{width:100%;box-sizing:border-box;background:#14241b;border:1px solid #22382b;
    border-radius:9px;padding:9px;color:#e9f2e8;font-size:13px;font-family:inherit}
  textarea{resize:vertical;min-height:54px}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:9px;border:1px solid #22382b;background:#14241b;color:#8ba596;
    border-radius:9px;font-weight:700;cursor:pointer;font-size:12px}
  .seg button.on{background:#52c06e;color:#06120a;border-color:#52c06e}
  .row{display:flex;gap:8px}
  .row>div{flex:1}
  .photo-box{margin-top:6px;border:1.5px dashed #22382b;border-radius:10px;padding:14px;text-align:center;
    cursor:pointer;background:#14241b}
  .photo-box img{max-width:100%;border-radius:8px;margin-top:8px}
  .btn{width:100%;padding:12px;border:none;border-radius:11px;background:#52c06e;color:#06120a;
    font-weight:800;font-size:14px;cursor:pointer;margin-top:14px}
  .btn.ghost{background:#14241b;color:#e9f2e8;border:1px solid #22382b}
  .hint{color:#8ba596;font-size:11px;margin-top:4px}
  .msg{margin-top:10px;padding:9px;border-radius:9px;font-size:12px;display:none}
  .msg.ok{background:rgba(82,192,110,.15);border:1px solid #52c06e;display:block}
  .msg.err{background:rgba(226,75,74,.15);border:1px solid #e24b4a;display:block}
  #priceWrap{display:none}
  .spin{opacity:.5;pointer-events:none}
</style>
</head>
<body>
  <h3>🥒 매물 등록 · 편집</h3>
  <button class="btn ghost" onclick="loadSelected()">선택한 행 불러오기</button>

  <input type="hidden" id="id">
  <input type="hidden" id="photoURL">

  <label>제목</label>
  <input id="title" placeholder="예) HP 26A 토너 미개봉">

  <div class="row">
    <div>
      <label>카테고리</label>
      <select id="category">
        <option>전산소모품</option><option>사무용품</option>
        <option>가구/비품</option><option>기타</option>
      </select>
    </div>
    <div>
      <label>거래 방식</label>
      <div class="seg">
        <button type="button" id="dealShare" class="on" onclick="setDeal('나눔')">나눔</button>
        <button type="button" id="dealSale" onclick="setDeal('판매')">판매</button>
      </div>
    </div>
  </div>

  <div id="priceWrap">
    <label>단가(원)</label>
    <input id="price" type="number" placeholder="5000">
  </div>

  <label>근무지(픽업 위치)</label>
  <input id="loc" placeholder="예) 본사 3층 IT운영팀">

  <label>닉네임</label>
  <input id="nick" placeholder="예) 오이박사">

  <label>설명</label>
  <textarea id="desc" placeholder="상태·수량·픽업 시간 등"></textarea>

  <label>사진 <span class="hint">(자동으로 WEBP 변환 후 Firebase Storage 업로드)</span></label>
  <div class="photo-box" onclick="document.getElementById('file').click()">
    <span id="photoLabel">📷 사진 선택</span>
    <input id="file" type="file" accept="image/*" style="display:none" onchange="convertAndUpload(this)">
    <img id="preview" style="display:none">
  </div>

  <button class="btn" id="saveBtn" onclick="save()">시트에 저장</button>
  <div class="msg" id="msg"></div>

<script>
  let deal = '나눔';
  function setDeal(d){
    deal = d;
    document.getElementById('dealShare').classList.toggle('on', d==='나눔');
    document.getElementById('dealSale').classList.toggle('on', d==='판매');
    document.getElementById('priceWrap').style.display = d==='판매' ? 'block' : 'none';
  }

  function loadSelected(){
    google.script.run.withSuccessHandler(o=>{
      if(!o){ flash('선택된 매물 행이 없어요','err'); return; }
      id.value=o.id; title.value=o.title||''; category.value=o.category||'전산소모품';
      setDeal(o.deal||'나눔'); price.value=o.price||''; loc.value=o.loc||'';
      nick.value=o.nick||''; desc.value=o.desc||''; photoURL.value=o.photoURL||'';
      if(o.photoURL){ preview.src=o.photoURL; preview.style.display='block'; }
      flash('불러왔어요. 수정 후 저장하세요','ok');
    }).getSelectedRow_();
  }

  function convertAndUpload(input){
    const f = input.files[0]; if(!f) return;
    const img = new Image(), url = URL.createObjectURL(f);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const max=1280; let{width:w,height:h}=img;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(blob=>{
        preview.src=URL.createObjectURL(blob); preview.style.display='block';
        photoLabel.textContent='업로드 중...';
        const fr=new FileReader();
        fr.onload=()=>{
          const b64=fr.result.split(',')[1];
          google.script.run
            .withSuccessHandler(res=>{ photoURL.value=res.url; photoLabel.textContent='✅ 사진 등록됨'; })
            .withFailureHandler(e=>{ photoLabel.textContent='📷 사진 선택'; flash('업로드 실패: '+e.message,'err'); })
            .uploadPhotoFromSidebar(b64, f.name.replace(/\.\w+$/,'.webp'), 'image/webp');
        };
        fr.readAsDataURL(blob);
      },'image/webp',0.8);
    };
    img.src=url;
  }

  function save(){
    if(!title.value.trim()){ flash('제목을 입력하세요','err'); return; }
    const btn=document.getElementById('saveBtn'); btn.classList.add('spin'); btn.textContent='저장 중...';
    const item={
      id:id.value||undefined, title:title.value.trim(), category:category.value,
      deal:deal, price: deal==='판매' ? (Number(price.value)||0) : 0,
      loc:loc.value.trim(), nick:nick.value.trim(), desc:desc.value.trim(),
      photoURL:photoURL.value, status:'판매중'
    };
    google.script.run.withSuccessHandler(r=>{
      btn.classList.remove('spin'); btn.textContent='시트에 저장';
      flash(r.mode+' 완료! (id: '+r.id+')','ok');
      if(r.mode==='등록'){ id.value=''; title.value=''; desc.value=''; price.value='';
        photoURL.value=''; preview.style.display='none'; photoLabel.textContent='📷 사진 선택'; }
    }).withFailureHandler(e=>{
      btn.classList.remove('spin'); btn.textContent='시트에 저장';
      flash('저장 실패: '+e.message,'err');
    }).saveFromSidebar(item);
  }

  function flash(t,type){ const m=document.getElementById('msg'); m.textContent=t; m.className='msg '+type;
    setTimeout(()=>{ if(type==='ok') m.className='msg'; }, 4000); }
</script>
</body>
</html>
