[build]
  base = "oiji-market"
  command = "pnpm build"
  publish = "out"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# PWA 관련 헤더
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"
